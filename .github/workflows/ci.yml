# CI — qualità del codice a ogni push/PR: lint, typecheck e test.
# Runner Windows: l'app è Windows-only (better-sqlite3 nativo, path handling,
# 7-Zip bundled) e i test vanno eseguiti sulla piattaforma target.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Typecheck · Test
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Test (vitest)
        run: npm test
