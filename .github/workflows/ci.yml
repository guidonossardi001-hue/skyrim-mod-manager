# CI — qualità del codice a ogni push/PR: lint, typecheck e test.
# Runner Windows: l'app è Windows-only (better-sqlite3 nativo, path handling \\?\,
# junction StockGame, 7-Zip bundled) e i test vanno eseguiti sulla piattaforma
# target, così la CI rispecchia l'ambiente locale/produzione senza drift.
# Node 24 (da .nvmrc): il modulo built-in `node:sqlite` usato dai test è disponibile
# SENZA flag (era dietro --experimental-sqlite fino a Node 22, unflagged da 23.4).
name: Run Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc' # unica fonte di verità: Node 24 = ambiente locale
          cache: 'npm'
      - name: Install dependencies
        run: npm ci # riproducibile, rispetta il lockfile (a differenza di npm install)
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Run test suite
        run: npm test -- --run
        env:
          # No-op su Node 24 (node:sqlite già sflaggato); rete di sicurezza se .nvmrc
          # tornasse a 22, dove node:sqlite richiede il flag. Va in NODE_OPTIONS — non
          # come flag CLI — perché i worker di Vitest ereditano NODE_OPTIONS, non gli
          # argomenti del processo padre.
          NODE_OPTIONS: --experimental-sqlite
