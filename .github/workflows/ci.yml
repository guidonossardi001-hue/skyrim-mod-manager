# CI — qualità del codice a ogni push/PR: lint, typecheck e test.
# Runner Windows: l'app è Windows-only (better-sqlite3 nativo, path handling,
# 7-Zip bundled) e i test vanno eseguiti sulla piattaforma target.
name: Run Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Run test suite
        run: npm test